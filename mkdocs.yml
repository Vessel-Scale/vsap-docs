site_name: Smart Assessment Platform - Help Center
site_url: https://docs.vesselimpact.com
site_description: Documentation for the Vessel Smart Assessment Platform
site_author: Vessel
copyright: 'Vessel, 2026'

#repo_url: https://github.com/vessel-impact/vsap-docs
#repo_name: vessel-impact/vsap-docs
#edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/vessel-logo-blue.png
  favicon: assets/vessel-favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Step 1 — Create an Account: getting-started/creating-your-account.md
    - Step 2 — Design an Assessment: getting-started/design-assessment.md
    - Step 3 — Create an Assessment: getting-started/create-assessment.md
    - Step 4 — Send to Respondents: getting-started/send-assessment.md
    - Step 5 — Analyze Results: getting-started/analyze-results.md
    - Step 6 — Create a Web Report: getting-started/create-web-report.md
    - Step 7 — Navigate the Dashboard: getting-started/navigating-the-dashboard.md
  - Dashboard:
    - Overview: dashboard/index.md
    - Components: dashboard/components.md
    - Configure Dashboard: dashboard/configure.md
    - Download CSV: dashboard/download.md
    - Pivot Table: dashboard/pivot-table.md
  - Accounts:
    - Overview: accounts/index.md
    - Account Details: accounts/details.md
    - Create Account: accounts/create.md
    - Edit Account: accounts/edit.md
    - Import & Export: accounts/import-export.md
  - Assessments:
    - Overview: assessments/index.md
    - Assessment Details: assessments/details.md
    - Create Assessment: assessments/create.md
    - Reports:
      - Web: assessments/report-builder.md
      - PDF: assessments/pdf-reports.md
  - Library:
    - Overview: library/index.md
    - Assessment List: library/list.md
    - Create Assessment: library/create.md
    - Edit Assessment: library/edit.md
    - Question Types: library/question-types.md
    - Scoring: library/scoring.md
    - Editing Icons: library/editing-icons.md
  - Ecosystem:
    - Overview: ecosystem/index.md
    - Filters: ecosystem/filters.md
    - Scores View: ecosystem/scores.md
    - Account List & Details: ecosystem/accounts.md
    - Legislators: ecosystem/legislators.md
  - Industries:
    - Overview: industries/index.md
    - NAICS Hierarchy: industries/hierarchy.md
    - Platform Integration: industries/platform-integration.md
  - Settings:
    - Overview: settings/index.md
    - Branding: settings/branding.md
    - Email Templates: settings/email-templates.md
    - Intake Forms: settings/intake-forms.md
    - Permissions: settings/permissions.md
    - Custom Data:
      - Overview: settings/custom-data/index.md
      - NAICS Codes: settings/custom-data/naics.md
      - Regional Associations: settings/custom-data/rma.md
      - Media Library: settings/custom-data/media-library.md    
    - Reports: 
      - Web: settings/web-reports.md
      - PDF: settings/pdf-reports.md
  - Client Portal:
    - Overview: client-portal/index.md
    - Assessments Table: client-portal/assessments-table.md
    - Industry Benchmarking: client-portal/industry-benchmarking.md

extra:
  social:
    - icon: fontawesome/solid/arrow-up-right-from-square
      link: https://www.vesselscale.com
      name: Go to Vessel
