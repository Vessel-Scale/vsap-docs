site_name: Vessel Smart Assessment Platform - Help Center
site_url: https://docs.vesselimpact.com
site_description: Documentation for the Vessel Smart Assessment Platform
site_author: Vessel

#repo_url: https://github.com/vessel-impact/vsap-docs
#repo_name: vessel-impact/vsap-docs
#edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Creating Your Account: getting-started/creating-your-account.md
    - Navigating the Dashboard: getting-started/navigating-the-dashboard.md
  - Dashboard:
    - Overview: dashboard/index.md
    - Pivot Table: dashboard/pivot-table.md
  - Accounts:
    - Overview: accounts/index.md
    - Account Details: accounts/details.md
    - Create Account: accounts/create.md
  - Evaluations:
    - Overview: evaluations/index.md
    - Evaluation Details: evaluations/details.md
    - Report Builder: evaluations/report-builder.md
    - Create Evaluation: evaluations/create.md
  - Library:
    - Overview: library/index.md
    - Create Assessment: library/create.md
    - Edit Assessment: library/edit.md
  - Ecosystem:
    - ecosystem/index.md
  - Industries:
    - industries/index.md
  - Settings:
    - Overview: settings/index.md
    - Branding: settings/branding.md
    - Custom Data: settings/custom-data.md

extra:
  social:
    - icon: fontawesome/solid/arrow-up-right-from-square
      link: https://www.vesselscale.com
      name: Go to Vessel
